name: smart_shelf
description: "Smart Shelf — IoT-powered shelf monitoring app"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.9.0

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.6.3

  # Animations
  flutter_animate: ^4.5.0
  lottie: ^3.3.1

  # Charts
  fl_chart: ^0.69.2

  # UI / Fonts
  google_fonts: ^6.2.1

  # Local notifications
  flutter_local_notifications: ^18.0.1

  # Storage / Preferences
  shared_preferences: ^2.3.5

  # Image picker
  image_picker: ^1.1.2

  # Glassmorphism / Blur
  glassmorphism: ^3.0.0

  # Shimmer loading
  shimmer: ^3.0.0

  # Connectivity
  connectivity_plus: ^6.1.2

  # Intl / Date formatting
  intl: ^0.19.0

  # Icons
  cupertino_icons: ^1.0.8
  hugeicons: ^0.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.6.1
  build_runner: ^2.4.13
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.1
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#0A0A1A"
  adaptive_icon_foreground: "assets/icon/icon_fg.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
    - assets/images/
    - assets/icon/

  fonts:
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Medium.ttf
          weight: 500
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700

